<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trove AI - Instagram Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .story-container {
            width: 375px;
            height: 667px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .story-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 1.8rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 30px;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .description {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 280px;
        }

        .cta-button {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: inline-block;
        }

        .cta-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .website {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 20px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .founder {
            position: absolute;
            bottom: 40px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .decorative-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .circle-1 {
            width: 200px;
            height: 200px;
            top: -50px;
            right: -50px;
        }

        .circle-2 {
            width: 150px;
            height: 150px;
            bottom: 50px;
            left: -30px;
        }

        .circle-3 {
            width: 80px;
            height: 80px;
            top: 100px;
            left: 20px;
        }

        .ai-icon {
            position: absolute;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .ai-icon-1 {
            top: 20%;
            right: 10%;
            animation-delay: 0s;
        }

        .ai-icon-2 {
            bottom: 25%;
            left: 8%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(102, 126, 234, 0.8) 0%, rgba(118, 75, 162, 0.8) 100%);
            z-index: 1;
        }

        .export-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            color: #6366f1;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .export-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        @media (max-width: 480px) {
            .story-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="gradient-overlay"></div>
        
        <div class="decorative-elements">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <div class="ai-icon ai-icon-1">🤖</div>
            <div class="ai-icon ai-icon-2">⚡</div>
        </div>

        <div class="story-content">
            <div class="logo">Trove AI</div>
            <div class="tagline">Discover Intelligent Solutions</div>
            <div class="description">Transform your business with cutting-edge AI-powered web development and digital solutions</div>
            <div class="website">troveai.com</div>
            <div class="founder">Founded by Tanisha Sathe</div>
        </div>
    </div>

    <button class="export-button" onclick="exportAsImage()">📸 Save as Image</button>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        function exportAsImage() {
            const element = document.querySelector('.story-container');
            
            html2canvas(element, {
                scale: 2,
                backgroundColor: null,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'trove-ai-instagram-story.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Add some interactive animations
        document.addEventListener('DOMContentLoaded', function() {
            const logo = document.querySelector('.logo');
            const tagline = document.querySelector('.tagline');
            
            setTimeout(() => {
                logo.style.animation = 'fadeInUp 1s ease forwards';
            }, 300);
            
            setTimeout(() => {
                tagline.style.animation = 'fadeInUp 1s ease forwards';
            }, 600);
        });

        // Add fadeInUp animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .logo, .tagline {
                opacity: 0;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
